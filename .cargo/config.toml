[alias]
# Same as `cargo run -p testbed` — kept for muscle memory.
testbed = "run -p testbed"

[env]
SIGMA_DISPLAY_MODE = "day"

# testbed depends on sigma-racer-telemetry (in the sigma-racer monorepo), which
# pulls vss-map. Resolve vss-map to the sibling checkout under embedded/.
[patch."https://github.com/sigmatactical-org/vss-map.git"]
vss-map = { path = "../vss-map" }

[patch."ssh://git@github.com/sigmatactical-org/vss-map.git"]
vss-map = { path = "../vss-map" }
