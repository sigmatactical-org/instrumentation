[package]
name = "instrumentation"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[[bin]]
name = "sigma-dash"
path = "src/main.rs"

[dependencies]
slint = { version = "1.16.1", default-features = false, features = ["renderer-femtovg", "backend-winit", "compat-1-2"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
[build-dependencies]
slint-build = "1.16.1"
